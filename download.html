<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download | dertjustwhy</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0a0a0c;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(14, 14, 18, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 40px;
            text-align: center;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
        }

        h1 {
            margin-bottom: 8px;
            font-size: 24px;
            color: #fff;
        }

        .meta {
            color: #888;
            font-size: 14px;
            margin-bottom: 24px;
        }

        p.description {
            margin-bottom: 32px;
            line-height: 1.5;
            color: #ccc;
        }

        a.download-btn {
            display: inline-block;
            background: #fff;
            color: #000;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.2s;
        }

        a.download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.2);
        }

        #loading {
            color: #aaa;
        }

        #error {
            color: #ff5555;
            display: none;
            margin-top: 16px;
        }
    </style>
</head>

<body>
    <div class="container" id="main">
        <div id="loading">Loading file info...</div>
        <div id="content" style="display: none;">
            <h1 id="fname">Filename</h1>
            <div class="meta" id="fsize">0 Bytes</div>
            <p class="description" id="fdesc"></p>
            <a href="#" id="fbtn" class="download-btn">Download</a>
        </div>
        <div id="error"></div>
    </div>

    <script>
        function formatBytes(bytes, decimals = 2) {
            if (!+bytes) return '0 Bytes';
            const k = 1024, dm = decimals < 0 ? 0 : decimals, sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        }

        async function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            const errorEl = document.getElementById('error');
            const loadEl = document.getElementById('loading');
            const contentEl = document.getElementById('content');

            if (!id) {
                loadEl.style.display = 'none';
                errorEl.textContent = 'Invalid file link.';
                errorEl.style.display = 'block';
                return;
            }

            try {
                const res = await fetch(`/api/file?id=${id}`);
                const data = await res.json();

                loadEl.style.display = 'none';

                if (!res.ok) {
                    errorEl.textContent = data.error || 'File not found.';
                    errorEl.style.display = 'block';
                    return;
                }

                document.getElementById('fname').textContent = data.filename;
                document.getElementById('fsize').textContent = formatBytes(data.size);
                document.getElementById('fdesc').textContent = data.description || '';
                document.getElementById('fbtn').href = data.fastio_url;

                contentEl.style.display = 'block';

            } catch (e) {
                loadEl.style.display = 'none';
                errorEl.textContent = 'An error occurred while loading file metadata.';
                errorEl.style.display = 'block';
            }
        }

        init();
    </script>
</body>

</html>
